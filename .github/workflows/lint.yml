name: linter

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-progress --prefer-dist
          npm install

      - name: Generate Wayfinder Routes
        # eslint-plugin-import needs the generated (gitignored) @/routes and
        # @/actions modules to resolve import groups the same way as locally.
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan wayfinder:generate --with-form

      - name: Check Pint
        run: composer lint:check

      - name: Check Frontend Formatting
        run: npm run format:check

      - name: Lint Frontend
        run: npm run lint:check
