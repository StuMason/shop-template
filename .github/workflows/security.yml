name: security

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'

      - name: Composer audit
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          composer audit

      - name: NPM audit
        # Block on critical only. The optional crypto-checkout wallet stack
        # (wagmi/viem/RainbowKit/WalletConnect) carries a long tail of
        # high-severity transitive advisories that the web3 ecosystem never
        # fully clears; they're surfaced in the log but must not red-wall CI.
        run: npm audit --omit=dev --audit-level=critical
